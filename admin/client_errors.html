<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İstemci Hataları - Admin Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="modals.js"></script>
    <style>
        .error-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .error-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
            display: grid;
            grid-template-columns: 80px 1fr 120px 150px;
            align-items: center;
            gap: 1.5rem;
        }

        .error-card:hover {
            background: rgba(255, 255, 255, 0.04);
            transform: scale(1.002);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .error-count {
            background: linear-gradient(135deg, var(--accent-fuchsia), var(--accent-cyan));
            color: #000;
            width: 50px;
            height: 50px;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.25rem;
            box-shadow: 0 4px 15px rgba(34, 211, 238, 0.2);
        }

        .error-info {
            overflow: hidden;
        }

        .error-msg {
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 0.4rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .error-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .type-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.65rem;
        }

        .type-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .type-warning { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .type-exception { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; }

        .affected-players {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .player-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.2rem 0.5rem;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--accent-cyan);
        }

        .btn-detail {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 0.6rem 1rem;
            border-radius: 1rem;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
        }

        .btn-detail:hover {
            background: #fff;
            color: #000;
        }

        #trace-modal-body {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.85rem;
            background: #020617;
            padding: 1.5rem;
            border-radius: 1rem;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-bolt-lightning"></i>
            <span>ADMIN CORE</span>
        </div>
        <nav class="nav-list">
            <a href="index.html" class="nav-item">
                <i class="fas fa-house-user"></i> Dashboard
            </a>
            <a href="players.html" class="nav-item">
                <i class="fas fa-id-badge"></i> Oyuncular
            </a>
            <a href="reports.html" class="nav-item">
                <i class="fas fa-flag"></i> Raporlar
            </a>
            <a href="management.html" class="nav-item">
                <i class="fas fa-gears"></i> Sistem Ayarları
            </a>
            <a href="announcement.html" class="nav-item">
                <i class="fas fa-bullhorn"></i> Duyurular
            </a>
            <a href="traffic.html" class="nav-item">
                <i class="fas fa-chart-area"></i> Trafik Analizi
            </a>
            <a href="logs.html" class="nav-item">
                <i class="fas fa-terminal"></i> Log Konsolu
            </a>
            <a href="client_errors.html" class="nav-item active">
                <i class="fas fa-bug"></i> İstemci Hataları
            </a>
            <a href="support.html" class="nav-item">
                <i class="fas fa-headset"></i> Destek
            </a>
            <a href="admins.html" class="nav-item">
                <i class="fas fa-user-shield"></i> Yönetim
            </a>
            <a href="market.html" class="nav-item">
                <i class="fas fa-shopping-cart"></i> Market
            </a>
            <a href="#" class="nav-item" onclick="logout()"
                style="margin-top: 1rem; color: #ef4444; border-color: rgba(239, 68, 68, 0.1);">
                <i class="fas fa-sign-out-alt"></i> Çıkış Yap
            </a>
        </nav>
        <div
            style="margin-top: auto; padding: 1rem; background: rgba(255,255,255,0.02); border-radius: 1rem; border: 1px solid var(--glass-border);">
            <div style="display: flex; align-items: center; gap: 0.75rem;">
                <div
                    style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent-fuchsia), var(--accent-cyan)); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-user-shield" style="color: #000; font-size: 1.2rem;"></i>
                </div>
                <div>
                    <div style="font-weight: 700; font-size: 0.9rem;">Server Admin</div>
                    <div style="font-size: 0.75rem; color: var(--text-secondary);">v1.0.8-beta</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="animate-slide-up delay-1">
            <h1 class="page-title">İstemci Hata Takibi</h1>
            <div style="display: flex; gap: 1rem;">
                <button onclick="clearAllErrors()" class="btn-refresh" style="background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: #ef4444;">
                    <i class="fas fa-trash-can"></i> TÜMÜNÜ TEMİZLE
                </button>
                <div class="status-pill">
                    <i class="fas fa-bug"></i>
                    AGGREGATED ERRORS
                </div>
            </div>
        </header>

        <div class="card animate-slide-up delay-2">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div style="display: flex; gap: 1rem; align-items: center; flex: 1;">
                    <div style="position: relative; flex: 1; max-width: 400px;">
                        <i class="fas fa-search" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary);"></i>
                        <input type="text" id="error-search" placeholder="Hata mesajı veya izi ara..." oninput="filterErrors()"
                            style="width: 100%; padding: 0.8rem 1rem 0.8rem 3rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 0.75rem; color: #fff;">
                    </div>
                </div>
                <button onclick="updateErrors()" class="btn-refresh">
                    <i class="fas fa-rotate"></i> YENİLE
                </button>
            </div>

            <div id="error-list" class="error-grid">
                <!-- JS Populated -->
                <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                    <p>Hata kayıtları yükleniyor...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Hata Detay Modalı (Gerekirse bu sayfa için özel ama modals.js kullanılacak) -->

    <script>
        let allErrors = [];

        async function updateErrors() {
            try {
                const response = await fetch('/api/client/errors');
                allErrors = await response.json();
                renderErrors(allErrors);
            } catch (e) { console.error('Errors update failed'); }
        }

        function renderErrors(errors) {
            const container = document.getElementById('error-list');
            if (errors.length === 0) {
                container.innerHTML = `<div style="text-align: center; padding: 4rem; color: var(--text-secondary); background: rgba(255,255,255,0.01); border-radius: 2rem; border: 1px dashed var(--glass-border);">
                    <i class="fas fa-check-circle" style="font-size: 3rem; margin-bottom: 1.5rem; color: #10b981; opacity: 0.5;"></i>
                    <h3>Şu an hiç hata kaydı yok!</h3>
                    <p>Sistem stabil görünüyor.</p>
                </div>`;
                return;
            }

            container.innerHTML = errors.map(err => {
                const typeClass = err.LogType == 3 ? 'type-exception' : (err.LogType == 0 ? 'type-error' : 'type-warning');
                const typeText = err.LogType == 3 ? 'Exception' : (err.LogType == 0 ? 'Error' : 'Warning');
                
                const players = err.AffectedPlayerIds.map(p => `<span class="player-tag">#${p}</span>`).join('');
                const lastSeen = new Date(err.LastSeen).toLocaleString('tr-TR');

                return `
                    <div class="error-card animate-slide-up">
                        <div class="error-count" title="Toplam Tekrar Sayısı">${err.Count}</div>
                        <div class="error-info">
                            <div class="error-msg" title="${err.LogMessage}">${err.LogMessage}</div>
                            <div class="error-meta">
                                <span class="type-badge ${typeClass}">${typeText}</span>
                                <span><i class="fas fa-map-marker-alt"></i> ${err.SceneName}</span>
                                <span><i class="fas fa-clock"></i> Son: ${lastSeen}</span>
                            </div>
                        </div>
                        <div class="affected-players">
                            ${players}
                        </div>
                        <div style="text-align: right;">
                            <button class="btn-detail" onclick="viewErrorDetail('${err.Id}')">DETAYLARI GÖR</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterErrors() {
            const query = document.getElementById('error-search').value.toLowerCase();
            const filtered = allErrors.filter(e => 
                e.LogMessage.toLowerCase().includes(query) || 
                e.StackTrace.toLowerCase().includes(query)
            );
            renderErrors(filtered);
        }

        function viewErrorDetail(id) {
            const err = allErrors.find(e => e.Id === id);
            if (!err) return;

            const content = `
                <div style="text-align: left; margin-bottom: 1.5rem;">
                    <div style="color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase;">TAM HATA MESAJI</div>
                    <div style="color: #fff; font-weight: 700; background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 0.75rem; margin-bottom: 1.5rem;">${err.LogMessage}</div>
                    
                    <div style="color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase;">STACK TRACE (HATA İZİ)</div>
                    <div id="trace-modal-body">${err.StackTrace}</div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem;">
                        <div style="background: rgba(255,255,255,0.02); padding: 0.75rem; border-radius: 0.75rem;">
                            <span style="display:block; font-size: 0.7rem; color: var(--text-secondary);">İLK GÖRÜLME</span>
                            <span style="font-weight: 600;">${new Date(err.FirstSeen).toLocaleString('tr-TR')}</span>
                        </div>
                        <div style="background: rgba(255,255,255,0.02); padding: 0.75rem; border-radius: 0.75rem;">
                            <span style="display:block; font-size: 0.7rem; color: var(--text-secondary);">SON GÖRÜLME</span>
                            <span style="font-weight: 600;">${new Date(err.LastSeen).toLocaleString('tr-TR')}</span>
                        </div>
                    </div>
                </div>
            `;

            Modal.show({
                title: `<i class="fas fa-bug" style="color: var(--accent-fuchsia)"></i> Hata Detayları`,
                message: content,
                confirmText: "KAPAT",
                cancelText: "",
                color: "var(--accent-fuchsia)"
            });
            
            // Cancel butonunu gizle (tek buton kalsın)
            document.getElementById('modal-cancel').style.display = 'none';
        }

        async function clearAllErrors() {
            Modal.confirm('Hataları Temizle', 'Tüm hata kayıtlarını silmek istediğinize emin misiniz? Bu işlem geri alınamaz.', async () => {
                try {
                    const response = await fetch('/api/client/errors/clear', { method: 'POST' });
                    const result = await response.json();
                    showToast(result.message);
                    updateErrors();
                } catch (e) { showToast('İşlem başarısız.', 'error'); }
            });
        }

        updateErrors();
        setInterval(updateErrors, 10000); // 10 saniyede bir yenile
    </script>
</body>

</html>
