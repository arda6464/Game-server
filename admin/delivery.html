<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eşya Gönderimi - Admin Core</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="modals.js"></script>
    <style>
        .delivery-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .delivery-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            animation: fadeIn 0.5s ease;
        }

        .form-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .input-label {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .input-label i {
            color: var(--accent-fuchsia);
        }

        .reward-item-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr auto;
            gap: 1rem;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 0.5rem;
        }

        .add-reward-btn {
            background: rgba(129, 140, 248, 0.1);
            color: var(--accent-indigo);
            border: 1px dashed var(--accent-indigo);
            padding: 1rem;
            border-radius: 1rem;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .add-reward-btn:hover {
            background: rgba(129, 140, 248, 0.2);
            transform: translateY(-2px);
        }

        .target-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .target-option {
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid transparent;
            padding: 1.5rem;
            border-radius: 1.5rem;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }

        .target-option.active {
            border-color: var(--accent-fuchsia);
            background: rgba(244, 114, 182, 0.05);
        }

        .target-option i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .send-btn {
            background: linear-gradient(135deg, var(--accent-fuchsia), var(--accent-indigo));
            color: white;
            padding: 1.5rem;
            border-radius: 1.5rem;
            border: none;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(244, 114, 182, 0.2);
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .send-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(244, 114, 182, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-bolt-lightning"></i>
            <span>ADMIN CORE</span>
        </div>
        <nav class="nav-list">
            <a href="index.html" class="nav-item">
                <i class="fas fa-house-user"></i> Dashboard
            </a>
            <a href="players.html" class="nav-item">
                <i class="fas fa-id-badge"></i> Oyuncular
            </a>
            <a href="delivery.html" class="nav-item active">
                <i class="fas fa-gift"></i> Eşya Gönderimi
            </a>
            <a href="clubs.html" class="nav-item">
                <i class="fas fa-users-viewfinder"></i> Kulüpler
            </a>
            <a href="reports.html" class="nav-item">
                <i class="fas fa-flag"></i> Raporlar
            </a>
            <a href="announcement.html" class="nav-item">
                <i class="fas fa-bullhorn"></i> Duyurular
            </a>
            <a href="chests.html" class="nav-item">
                <i class="fas fa-box-open"></i> Sandık & Drop
            </a>
            <a href="market.html" class="nav-item">
                <i class="fas fa-shopping-cart"></i> Market
            </a>
            <a href="logs.html" class="nav-item">
                <i class="fas fa-terminal"></i> Log Konsolu
            </a>
            <a href="traffic.html" class="nav-item">
                <i class="fas fa-chart-area"></i> Trafik Analizi
            </a>
            <a href="client_errors.html" class="nav-item">
                <i class="fas fa-bug"></i> İstemci Hataları
            </a>
            <a href="support.html" class="nav-item">
                <i class="fas fa-headset"></i> Destek
            </a>
            <a href="admins.html" class="nav-item">
                <i class="fas fa-user-shield"></i> Yönetim
            </a>
            <a href="management.html" class="nav-item">
                <i class="fas fa-gears"></i> Sistem Ayarları
            </a>
            <a href="#" class="nav-item" onclick="logout()"
                style="margin-top: 1rem; color: #ef4444; border-color: rgba(239, 68, 68, 0.1);">
                <i class="fas fa-sign-out-alt"></i> Çıkış Yap
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="delivery-container">
            <header>
                <h1 class="page-title">Eşya Gönderim Sistemi</h1>
                <p style="color: var(--text-secondary);">Oyunculara veya tüm sunucuya hediye paketleri gönderin.</p>
            </header>

            <div class="delivery-card">
                <div class="form-section">
                    <div class="input-group">
                        <label class="input-label"><i class="fas fa-bullseye"></i> Hedef Kitle</label>
                        <div class="target-selector">
                            <div class="target-option active" id="target-single" onclick="setTarget('single')">
                                <i class="fas fa-user"></i>
                                <span>Tekil Oyuncu</span>
                            </div>
                            <div class="target-option" id="target-all" onclick="setTarget('all')">
                                <i class="fas fa-users"></i>
                                <span>Tüm Oyuncular</span>
                            </div>
                        </div>
                    </div>

                    <div id="player-id-section" class="input-group">
                        <label class="input-label"><i class="fas fa-fingerprint"></i> Oyuncu ID</label>
                        <input type="number" id="target-id" class="modal-input" placeholder="Örn: 1001" style="margin:0;">
                    </div>


                    <div class="input-group">
                        <label class="input-label"><i class="fas fa-envelope"></i> Mesaj İçeriği</label>
                        <textarea id="delivery-message" class="modal-input" style="margin:0; height: 100px; padding: 1rem;" placeholder="Oyuncunun göreceği mesaj..."></textarea>
                    </div>

                    <div class="input-group">
                        <label class="input-label"><i class="fas fa-box-open"></i> Ödül Paketi</label>
                        <div id="rewards-list">
                            <!-- Ödül satırları buraya gelecek -->
                        </div>
                        <button class="add-reward-btn" onclick="addRewardRow()">
                            <i class="fas fa-plus"></i> YENİ ÖDÜL EKLE
                        </button>
                    </div>

                    <button class="send-btn" onclick="confirmDelivery()">
                        <i class="fas fa-paper-plane"></i> PAKETİ GÖNDER
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentTarget = 'single';

        function setTarget(target) {
            currentTarget = target;
            document.getElementById('target-single').classList.toggle('active', target === 'single');
            document.getElementById('target-all').classList.toggle('active', target === 'all');
            document.getElementById('player-id-section').style.display = target === 'single' ? 'flex' : 'none';
        }

        function addRewardRow() {
            const container = document.getElementById('rewards-list');
            const row = document.createElement('div');
            row.className = 'reward-item-row';
            row.innerHTML = `
                <select class="modal-input reward-type" style="margin:0;">
                    <option value="0">Elmas (Gems)</option>
                    <option value="1">Altın (Coins)</option>
                    <option value="7">Karakter (Character)</option>
                    <option value="3">Avatar/Skin</option>
                    <option value="8">Güç Puanı (PowerPoints)</option>
                    <option value="9">İfade (Emote)</option>
                    <option value="2">Battle Pass</option>
                    <option value="4">XP Boost</option>
                </select>
                <input type="number" class="modal-input reward-count" placeholder="Miktar" value="100" style="margin:0;">
                <input type="number" class="modal-input reward-dataid" placeholder="Data ID" value="0" style="margin:0;">
                <button class="secondary-btn" style="color:#ef4444;" onclick="this.parentElement.remove()">
                    <i class="fas fa-trash"></i>
                </button>
            `;
            container.appendChild(row);
        }

        async function confirmDelivery() {
            const message = document.getElementById('delivery-message').value;
            const targetId = currentTarget === 'all' ? 0 : parseInt(document.getElementById('target-id').value);

            if (!message) {
                showToast('Lütfen bir mesaj girin!', 'error');
                return;
            }

            if (currentTarget === 'single' && !targetId) {
                showToast('Lütfen geçerli bir Oyuncu ID girin!', 'error');
                return;
            }

            const rewardRows = document.querySelectorAll('.reward-item-row');
            const rewards = [];
            rewardRows.forEach(row => {
                rewards.push({
                    Type: parseInt(row.querySelector('.reward-type').value),
                    Count: parseInt(row.querySelector('.reward-count').value),
                    DataId: parseInt(row.querySelector('.reward-dataid').value)
                });
            });

            if (rewards.length === 0) {
                showToast('Lütfen en az bir ödül ekleyin!', 'error');
                return;
            }

            Modal.confirm(
                'Gönderimi Onayla',
                `${currentTarget === 'all' ? 'TÜM OYUNCULARA' : 'Oyuncu #' + targetId + ' kişisine'} bu paket gönderilecek. Emin misiniz?`,
                async () => {
                    try {
                        const res = await fetch('/api/delivery/send', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                targetId: targetId,
                                title: "SİSTEM",
                                message: message,
                                rewards: rewards
                            })
                        });
                        const data = await res.json();
                        if (data.success) {
                            showToast('Paket başarıyla gönderildi!', 'success');
                            resetForm();
                        } else {
                            showToast(data.message, 'error');
                        }
                    } catch (e) {
                        showToast('Bir hata oluştu!', 'error');
                    }
                }
            );
        }

        function resetForm() {
            document.getElementById('delivery-message').value = '';
            document.getElementById('target-id').value = '';
            document.getElementById('rewards-list').innerHTML = '';
            addRewardRow();
        }

        // Başlangıçta bir satır ekle
        addRewardRow();
    </script>
</body>

</html>
