<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - Admin Core</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="modals.js"></script>
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, rgba(217, 70, 239, 0.05), transparent),
                radial-gradient(circle at bottom left, rgba(34, 211, 238, 0.05), transparent),
                var(--bg-dark);
            overflow: hidden;
            margin: 0;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            position: relative;
        }

        /* Arkaplan dekorasyonları */
        .login-wrapper::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: var(--accent-fuchsia);
            filter: blur(120px);
            opacity: 0.1;
            z-index: -1;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .brand-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--accent-fuchsia), var(--accent-cyan));
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            color: #000;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.3);
            animation: iconPulse 3s infinite;
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-cyan);
            margin-bottom: 0.5rem;
            margin-left: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .login-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            padding: 1rem 1.25rem 1rem 3.25rem;
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            box-sizing: border-box;
        }

        .login-input:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.1);
        }

        .login-input:focus+i {
            color: var(--accent-cyan);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-fuchsia));
            border: none;
            border-radius: 1rem;
            padding: 1rem;
            color: #000;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 10px 20px -5px rgba(34, 211, 238, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(34, 211, 238, 0.4);
            filter: brightness(1.1);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .footer-text {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: none;
            animation: modalSoftIn 0.3s ease-out;
        }
    </style>
</head>

<body>

    <div class="login-wrapper animate-slide-up">
        <div class="login-card">
            <div class="brand-icon">
                <i class="fas fa-shield-halved"></i>
            </div>

            <h1 class="login-title">Admin Core</h1>
            <p class="login-subtitle">Yönetim paneline erişmek için giriş yapın.</p>

            <div id="error-box" class="error-msg"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Kullanıcı Adı</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" class="login-input" placeholder="Kullanıcı adınızı girin"
                            required autocomplete="username">
                        <i class="fas fa-user"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Şifre</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="login-input" placeholder="••••••••" required
                            autocomplete="current-password">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="submit-btn">
                    <span>GİRİŞ YAP</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <p class="footer-text">© 2026 Game Server Auth System v1.0</p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            const errorBox = document.getElementById('error-box');
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> BAĞLANILIYOR...';
            errorBox.style.display = 'none';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                if (data.success) {
                    // Sayfayı yenile veya dashboard'a git
                    window.location.href = '/index.html';
                } else {
                    errorBox.textContent = data.message || 'Giriş başarısız.';
                    errorBox.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span>TEKRAR DENE</span><i class="fas fa-arrow-right"></i>';
                }
            } catch (err) {
                console.error('Login error:', err);
                errorBox.textContent = 'Sunucu bağlantı hatası.';
                errorBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>TEKRAR DENE</span><i class="fas fa-arrow-right"></i>';
            }
        });
    </script>

</body>

</html>
