<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oyuncular - Admin Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="modals.js"></script>
    <style>
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 0.75rem;
        }

        th {
            text-align: left;
            color: var(--text-secondary);
            font-weight: 700;
            font-size: 0.75rem;
            padding: 0 1.5rem 1rem 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        td {
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            transition: background 0.3s ease;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }

        td:first-child {
            border-left: 1px solid var(--glass-border);
            border-top-left-radius: 1.25rem;
            border-bottom-left-radius: 1.25rem;
        }

        td:last-child {
            border-right: 1px solid var(--glass-border);
            border-top-right-radius: 1.25rem;
            border-bottom-right-radius: 1.25rem;
        }

        .player-id {
            font-family: monospace;
            background: rgba(34, 211, 238, 0.1);
            padding: 0.4rem 0.75rem;
            border-radius: 0.75rem;
            font-weight: 700;
            color: var(--accent-cyan);
            font-size: 0.85rem;
        }

        .player-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 800;
            font-size: 0.7rem;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            text-transform: uppercase;
        }

        .status-online {
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .status-offline {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .btn-kick {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-kick:hover {
            background: #ef4444;
            color: #fff;
        }

        .ip-badge {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-family: monospace;
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-bolt-lightning"></i>
            <span>ADMIN CORE</span>
        </div>
        <nav class="nav-list">
            <a href="index.html" class="nav-item">
                <i class="fas fa-house-user"></i> Dashboard
            </a>
            <a href="players.html" class="nav-item active">
                <i class="fas fa-id-badge"></i> Oyuncular
            </a>
            <a href="reports.html" class="nav-item">
                <i class="fas fa-flag"></i> Raporlar
            </a>
            <a href="management.html" class="nav-item">
                <i class="fas fa-gears"></i> Sistem Ayarları
            </a>
            <a href="announcement.html" class="nav-item">
                <i class="fas fa-bullhorn"></i> Duyurular
            </a>
            <a href="traffic.html" class="nav-item">
                <i class="fas fa-chart-area"></i> Trafik Analizi
            </a>
            <a href="logs.html" class="nav-item">
                <i class="fas fa-terminal"></i> Log Konsolu
            </a>
            <a href="client_errors.html" class="nav-item">
                <i class="fas fa-bug"></i> İstemci Hataları
            </a>
            <a href="support.html" class="nav-item">
                <i class="fas fa-headset"></i> Destek
            </a>
            <a href="admins.html" class="nav-item">
                <i class="fas fa-user-shield"></i> Yönetim
            </a>
            <a href="market.html" class="nav-item">
                <i class="fas fa-shopping-cart"></i> Market
            </a>
            <a href="#" class="nav-item" onclick="logout()"
                style="margin-top: 1rem; color: #ef4444; border-color: rgba(239, 68, 68, 0.1);">
                <i class="fas fa-sign-out-alt"></i> Çıkış Yap
            </a>
        </nav>
        <div
            style="margin-top: auto; padding: 1rem; background: rgba(255,255,255,0.02); border-radius: 1rem; border: 1px solid var(--glass-border);">
            <div style="display: flex; align-items: center; gap: 0.75rem;">
                <div
                    style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent-fuchsia), var(--accent-cyan)); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-user-shield" style="color: #000; font-size: 1.2rem;"></i>
                </div>
                <div>
                    <div style="font-weight: 700; font-size: 0.9rem;">Server Admin</div>
                    <div style="font-size: 0.75rem; color: var(--text-secondary);">v1.0.4-beta</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="animate-slide-up delay-1">
            <h1 class="page-title">Sistemdeki Tüm Oyuncular</h1>
            <div id="player-count-badge" class="status-pill">
                <i class="fas fa-users"></i>
                0 TOPLAM HESAP
            </div>
        </header>

        <div class="card animate-slide-up delay-2">
            <div style="display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="display: flex; align-items: center; gap: 0.75rem;">
                        <i class="fas fa-database" style="color:var(--accent-fuchsia)"></i> Oyuncu Veritabanı
                    </h3>
                    <button onclick="updatePlayers()" class="btn-refresh">
                        <i class="fas fa-rotate"></i> Listeyi Yenile
                    </button>
                </div>

                <div style="display: flex; gap: 1rem; align-items: center;">
                    <div style="flex: 1; position: relative;">
                        <i class="fas fa-search"
                            style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary);"></i>
                        <input type="text" id="player-search" placeholder="İsim veya Hesap ID ile ara..."
                            oninput="filterPlayers()"
                            style="width: 100%; padding: 0.8rem 1rem 0.8rem 3rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 0.75rem; color: #fff;">
                    </div>
                    <div style="display: flex; gap: 0.5rem;" id="filter-pills">
                        <button class="pill active" onclick="setFilter('all')">Tümü</button>
                        <button class="pill" onclick="setFilter('online')">Online</button>
                        <button class="pill" onclick="setFilter('banned')">Banlı</button>
                    </div>
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table id="player-table">
                    <thead>
                        <tr>
                            <th>HESAP ID</th>
                            <th>KULLANICI</th>
                            <th>DURUM</th>
                            <th>AKSİYONLAR</th>
                        </tr>
                    </thead>
                    <tbody id="player-list-body">
                        <!-- JS populated -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal-overlay" style="display:none;">
        <div class="modal-card card">
            <h2 id="modal-title">Oyuncu Düzenle</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem;">
                <div>
                    <label class="input-label">SEVİYE</label>
                    <input type="number" id="edit-level" class="modal-input">
                </div>
                <div>
                    <label class="input-label">KUPA</label>
                    <input type="number" id="edit-trophies" class="modal-input">
                </div>
                <div>
                    <label class="input-label">ELMAS</label>
                    <input type="number" id="edit-gems" class="modal-input">
                </div>
                <div>
                    <label class="input-label">ALTIN</label>
                    <input type="number" id="edit-coins" class="modal-input">
                </div>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                <button onclick="closeModal()" class="secondary-btn">İptal</button>
                <button onclick="savePlayer()" class="primary-btn" style="padding: 0.75rem 2rem;">Kaydet</button>
            </div>
        </div>
    </div>

    <style>
        .pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            padding: 0.5rem 1.25rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .pill.active {
            background: var(--accent-fuchsia);
            color: #fff;
            border-color: var(--accent-fuchsia);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            width: 500px;
            padding: 2.5rem;
            border: 1px solid var(--accent-fuchsia);
        }

        .input-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .modal-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            padding: 0.75rem;
            border-radius: 0.75rem;
            color: #fff;
            font-weight: 700;
        }

        .primary-btn {
            background: var(--accent-fuchsia);
            color: #fff;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 700;
        }

        .row-banned {
            background: rgba(220, 38, 38, 0.05) !important;
            color: #ef4444 !important;
        }

        .btn-edit {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid var(--glass-border);
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
        }
    </style>

    <script>

        let allPlayers = [];
        let currentFilter = 'all';
        let editingPlayerId = null;

        async function updatePlayers() {
            try {
                const response = await fetch('/api/players');
                allPlayers = await response.json();
                filterPlayers();
            } catch (e) { console.error('Players update failed'); }
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            filterPlayers();
        }

        function filterPlayers() {
            const query = document.getElementById('player-search').value.toLowerCase();
            const tbody = document.getElementById('player-list-body');
            tbody.innerHTML = '';

            let filtered = allPlayers.filter(p => {
                const matchesSearch = p.username.toLowerCase().includes(query) || p.id.toString().includes(query);
                if (currentFilter === 'online') return matchesSearch && p.isOnline;
                if (currentFilter === 'banned') return matchesSearch && p.isBanned;
                return matchesSearch;
            });

            document.getElementById('player-count-badge').innerHTML = `<i class="fas fa-users"></i> ${allPlayers.length} HESAP (${filtered.length} FİLTRELENDİ)`;

            filtered.sort((a, b) => b.isOnline - a.isOnline);

            filtered.forEach(p => {
                const tr = document.createElement('tr');
                if (p.isBanned) tr.className = 'row-banned';

                const statusBadge = p.isBanned ?
                    `<div class="status-badge" style="background:rgba(239, 68, 68, 0.1); color:#ef4444; border:1px solid rgba(239, 68, 68, 0.2);">● YASAKLI</div>` :
                    (p.isOnline ? `<div class="status-badge status-online">● ONLINE</div>` : `<div class="status-badge status-offline">○ OFFLINE</div>`);

                tr.innerHTML = `
                    <td><span class="player-id">${p.id}</span></td>
                    <td><span class="player-name">${p.username}</span></td>
                    <td>${statusBadge}</td>
                    <td>
                        <div style="display:flex; gap:0.6rem;">
                            <button class="btn-view" onclick="location.href='profile.html?id=${p.id}'">
                                <i class="fas fa-user-circle"></i> PROFİL
                            </button>
                            <button class="btn-edit" onclick="openEditModal('${p.id}')" style="background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:#fff; border-radius:10px; padding:0.6rem;">
                                <i class="fas fa-edit"></i>
                            </button>
                            ${p.isOnline ? `<button class="btn-kick" onclick="kickPlayer('${p.id}')"><i class="fas fa-bolt"></i> KOV</button>` : ''}
                            ${p.isBanned ?
                        `<button class="btn-unban" onclick="unbanPlayer('${p.id}')"><i class="fas fa-unlock"></i> KALDIR</button>` :
                        `<button class="btn-ban" onclick="banPlayer('${p.id}')"><i class="fas fa-ban"></i> BANLA</button>`
                    }
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openEditModal(playerId) {
            const player = allPlayers.find(p => p.id == playerId);
            if (!player) return;
            editingPlayerId = playerId;
            document.getElementById('modal-title').innerText = `${player.username} Düzenleniyor`;
            document.getElementById('edit-level').value = player.level;
            document.getElementById('edit-trophies').value = player.trophies;
            document.getElementById('edit-gems').value = player.gems;
            document.getElementById('edit-coins').value = player.coins;
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

        async function savePlayer() {
            const data = {
                id: editingPlayerId,
                level: document.getElementById('edit-level').value,
                trophies: document.getElementById('edit-trophies').value,
                gems: document.getElementById('edit-gems').value,
                coins: document.getElementById('edit-coins').value
            };
            try {
                const res = await fetch('/api/player/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                showToast(result.message, result.success ? 'success' : 'error');
                closeModal();
                updatePlayers();
            } catch (e) { showToast('Hata: ' + e.message, 'error'); }
        }

        async function unbanPlayer(playerId) {
            Modal.confirm('Yasağı Kaldır', 'Bu oyuncunun yasaklamasını kaldırmak istediğinize emin misiniz?', async () => {
                try {
                    const response = await fetch('/api/player/unban', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: playerId })
                    });
                    const result = await response.json();
                    showToast(result.message);
                    updatePlayers();
                } catch (e) { showToast('Hata: ' + e.message, 'error'); }
            });
        }

        async function kickPlayer(playerId) {
            Modal.confirm('Oyuncuyu Kov', 'Bu oyuncuyu sunucudan atmak istediğinize emin misiniz?', async () => {
                try {
                    const response = await fetch('/api/player/kick', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: playerId })
                    });
                    const result = await response.json();
                    showToast(result.message, result.success ? 'success' : 'error');
                    updatePlayers();
                } catch (e) { showToast('Hata: ' + e.message, 'error'); }
            });
        }

        async function banPlayer(playerId) {
            Modal.prompt('Oyuncuyu Yasakla', 'Bu oyuncuyu yasaklamak için bir neden belirtin:', 'Kural İhlali', async (reason) => {
                if (!reason) return;
                try {
                    const response = await fetch('/api/player/ban', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: playerId, reason: reason })
                    });
                    const result = await response.json();
                    showToast(result.message, result.success ? 'success' : 'error');
                    updatePlayers();
                } catch (e) { showToast('Hata: ' + e.message, 'error'); }
            });
        }

        setInterval(updatePlayers, 5000);
        updatePlayers();
    </script>
</body>

</html>
