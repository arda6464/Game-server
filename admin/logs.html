<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Logları - Admin Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="modals.js"></script>
    <style>
        .terminal-container {
            background: #020617;
            border-radius: 1.5rem;
            padding: 2rem;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            height: calc(100vh - 350px);
            overflow-y: auto;
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .terminal-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .terminal-line {
            line-height: 1.8;
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
            white-space: pre-wrap;
            border-left: 2px solid transparent;
            padding-left: 1rem;
        }

        .log-type-error {
            color: #f87171;
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        .log-type-general {
            color: #4ade80;
            border-color: #10b981;
        }

        .log-type-account {
            color: #60a5fa;
            border-color: #3b82f6;
        }

        .console-box {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.02);
            padding: 1.5rem;
            border-radius: 1.5rem;
            border: 1px solid var(--glass-border);
        }

        .console-input {
            flex: 1;
            background: #020617;
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            padding: 1.25rem 1.5rem;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .console-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.1);
        }

        .btn-send {
            background: linear-gradient(135deg, var(--accent-fuchsia), var(--accent-cyan));
            border: none;
            border-radius: 1rem;
            padding: 0 2.5rem;
            color: #000;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .btn-send:hover {
            transform: scale(1.02);
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-bolt-lightning"></i>
            <span>ADMIN CORE</span>
        </div>
        <nav class="nav-list">
            <a href="index.html" class="nav-item">
                <i class="fas fa-house-user"></i> Dashboard
            </a>
            <a href="players.html" class="nav-item">
                <i class="fas fa-id-badge"></i> Oyuncular
            </a>
            <a href="reports.html" class="nav-item">
                <i class="fas fa-flag"></i> Raporlar
            </a>
            <a href="management.html" class="nav-item">
                <i class="fas fa-gears"></i> Sistem Ayarları
            </a>
            <a href="announcement.html" class="nav-item">
                <i class="fas fa-bullhorn"></i> Duyurular
            </a>
            <a href="traffic.html" class="nav-item">
                <i class="fas fa-chart-area"></i> Trafik Analizi
            </a>
            <a href="logs.html" class="nav-item active">
                <i class="fas fa-terminal"></i> Log Konsolu
            </a>
            <a href="client_errors.html" class="nav-item">
                <i class="fas fa-bug"></i> İstemci Hataları
            </a>
            <a href="support.html" class="nav-item">
                <i class="fas fa-headset"></i> Destek
            </a>
            <a href="admins.html" class="nav-item">
                <i class="fas fa-user-shield"></i> Yönetim
            </a>
            <a href="market.html" class="nav-item">
                <i class="fas fa-shopping-cart"></i> Market
            </a>
            <a href="#" class="nav-item" onclick="logout()"
                style="margin-top: 1rem; color: #ef4444; border-color: rgba(239, 68, 68, 0.1);">
                <i class="fas fa-sign-out-alt"></i> Çıkış Yap
            </a>
        </nav>
        <div
            style="margin-top: auto; padding: 1rem; background: rgba(255,255,255,0.02); border-radius: 1rem; border: 1px solid var(--glass-border);">
            <div style="display: flex; align-items: center; gap: 0.75rem;">
                <div
                    style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent-fuchsia), var(--accent-cyan)); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-user-shield" style="color: #000; font-size: 1.2rem;"></i>
                </div>
                <div>
                    <div style="font-weight: 700; font-size: 0.9rem;">Server Admin</div>
                    <div style="font-size: 0.75rem; color: var(--text-secondary);">v1.0.4-beta</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="animate-slide-up delay-1">
            <h1 class="page-title">Sistem Log Akışı</h1>
            <div class="status-pill">
                <i class="fas fa-microchip"></i>
                REAL-TIME STREAM
            </div>
        </header>

        <div class="terminal-container animate-slide-up delay-2">
            <div class="terminal-header">
                <div style="display:flex; gap: 6px;">
                    <div style="width:12px; height:12px; border-radius:50%; background:#ff5f56;"></div>
                    <div style="width:12px; height:12px; border-radius:50%; background:#ffbd2e;"></div>
                    <div style="width:12px; height:12px; border-radius:50%; background:#27c93f;"></div>
                </div>
                <span
                    style="margin-left: 1rem; font-size: 0.75rem; color: var(--text-secondary); font-weight: 700;">SERVER_OUTPUT:
                    genellog.log</span>
                <button onclick="updateLogs()" class="btn-refresh" style="padding: 0.5rem 1rem; font-size: 0.75rem;">
                    <i class="fas fa-rotate"></i> TAZELE
                </button>
            </div>
            <div id="log-content"></div>
        </div>

        <div class="console-box animate-slide-up delay-3">
            <div style="position: relative; flex: 1; display: flex; align-items: center;">
                <i class="fas fa-chevron-right"
                    style="position: absolute; left: 1.5rem; color: var(--accent-cyan); opacity: 0.5;"></i>
                <input type="text" id="log-cmd-input" class="console-input" style="padding-left: 3rem;"
                    placeholder="Global komut girişi yapın...">
            </div>
            <button class="btn-send" onclick="sendQuickCommand()">ÇALIŞTIR</button>
        </div>
    </main>

    <script>

        async function updateLogs() {
            try {
                const response = await fetch('/api/logs');
                const data = await response.json();
                const container = document.getElementById('log-content');
                const lines = data.logs.split('\n');
                container.innerHTML = '';
                lines.forEach(line => {
                    if (!line.trim()) return;
                    const div = document.createElement('div');
                    div.className = 'terminal-line';

                    if (line.includes('[ERROR]')) div.classList.add('log-type-error');
                    else if (line.includes('[GENERAL]')) div.classList.add('log-type-general');
                    else if (line.includes('[ACCOUNT]')) div.classList.add('log-type-account');

                    div.innerText = line;
                    container.appendChild(div);
                });
                container.parentElement.scrollTop = container.parentElement.scrollHeight;
            } catch (e) { console.error('Logs update failed'); }
        }

        async function sendQuickCommand() {
            const input = document.getElementById('log-cmd-input');
            const cmd = input.value;
            if (!cmd) return;
            try {
                const response = await fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                const result = await response.json();
                showToast('Sistem Yanıtı: ' + result.message);
                input.value = '';
                setTimeout(updateLogs, 800);
            } catch (e) { showToast('Sistem Hatası: ' + e.message, 'error'); }
        }

        document.getElementById('log-cmd-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendQuickCommand();
        });

        setInterval(updateLogs, 5000);
        updateLogs();
    </script>
</body>

</html>
